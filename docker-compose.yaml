version: "3.8"

services:
    ros2_servo:
        build:
            context: .
            dockerfile: Dockerfile

        container_name: ros2_servo_control

        # 特权模式，访问硬件设备
        privileged: true

        # 网络模式：host（与宿主机共享网络）
        network_mode: host

        # 设备映射（串口和I2C）
        devices:
            - /dev/ttyUSB0:/dev/ttyUSB0 # USB串口（总线舵机）
            - /dev/ttyAMA0:/dev/ttyAMA0 # 树莓派硬件串口
            - /dev/ttyAMA1:/dev/ttyAMA1 # 树莓派第二硬件串口
            - /dev/ttyAMA2:/dev/ttyAMA2 # 树莓派第三硬件串口
            - /dev/ttyAMA3:/dev/ttyAMA3 # 树莓派第四硬件串口
            - /dev/ttyAMA4:/dev/ttyAMA4 # 树莓派第五硬件串口
            - /dev/i2c-1:/dev/i2c-1 # I2C总线（PCA9685）

        # 卷挂载
        volumes:
            # 挂载项目代码（开发模式）
            - ./src:/root/ros_ws/src:rw
            # 挂载构建输出（加速重启）
            - ./build:/root/ros_ws/build:rw
            - ./install:/root/ros_ws/install:rw
            - ./log:/root/ros_ws/log:rw

        # 环境变量
        environment:
            - ROS_DOMAIN_ID=0
            - ROS_LOCALHOST_ONLY=0
            - PYTHONUNBUFFERED=1
            - TZ=Asia/Shanghai

        # 工作目录
        working_dir: /root/ros_ws

        # 启动命令（开发模式：进入bash）
        command: /bin/bash

        # 保持容器运行
        stdin_open: true
        tty: true

        # 重启策略
        restart: unless-stopped

    # 可选：生产模式服务
    ros2_servo_prod:
        extends: ros2_servo
        container_name: ros2_servo_production

        # 生产模式：自动启动系统
        command: >
            bash -c "
              source /opt/ros/jazzy/setup.bash &&
              source /root/ros_ws/install/setup.bash &&
              ros2 launch websocket_bridge full_system.launch.py
            "

        # 生产模式：总是重启
        restart: always

        profiles:
            - production
