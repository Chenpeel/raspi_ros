services:
    ros2_servo:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: ros2_servo_control

        # 自动适配当前主机架构（不指定 platform 让 Docker 自动检测）
        # platform: "linux/amd64"  # 如需强制指定架构，取消此行注释并设置目标架构

        # 特权模式，访问硬件设备
        privileged: true

        # 网络模式：host（与宿主机共享网络）
        network_mode: host

        # 设备映射（串口和I2C）
        # 仅映射存在的设备（即使设备不存在也不会报错）
        devices:
            # USB串口（适用于所有平台）
            - /dev/ttyUSB0:/dev/ttyUSB0 # USB串口
            # 树莓派特定串口（在非树莓派平台不存在也不会报错）
            - /dev/ttyAMA0:/dev/ttyAMA0 # 树莓派硬件串口
            - /dev/ttyAMA1:/dev/ttyAMA1 # 树莓派第二硬件串口
            - /dev/ttyAMA2:/dev/ttyAMA2 # 树莓派第三硬件串口
            - /dev/ttyAMA3:/dev/ttyAMA3 # 树莓派第四硬件串口
            - /dev/ttyAMA4:/dev/ttyAMA4 # 树莓派第五硬件串口
            # I2C总线（适用于树莓派和具有I2C接口的系统）
            - /dev/i2c-1:/dev/i2c-1 # I2C总线

        # 卷挂载
        volumes:
            - ./src:/root/ros_ws/src:rw
            - ./build:/root/ros_ws/build:rw
            - ./install:/root/ros_ws/install:rw
            - ./log:/root/ros_ws/log:rw
            - ./scripts:/root/ros_ws/scripts:rw

        # 环境变量
        environment:
            - ROS_DOMAIN_ID=0
            - ROS_LOCALHOST_ONLY=0
            - PYTHONUNBUFFERED=1
            - TZ=Asia/Shanghai

        # 工作目录
        working_dir: /root/ros_ws

        # 启动命令（开发模式：进入bash）
        command: /bin/bash

        # 保持容器运行
        stdin_open: true
        tty: true

        # 重启策略
        restart: unless-stopped

    # 可选：本地开发模式服务
    ros2_servo_dev:
        extends: ros2_servo
        container_name: ros2_dev
        devices:
            - /dev/ttyUSB0:/dev/ttyUSB0

        # 开发模式环境变量
        environment:
            - ROS_DOMAIN_ID=0
            - ROS_LOCALHOST_ONLY=0
            - PYTHONUNBUFFERED=1
            - TZ=Asia/Shanghai
            - DEVELOPMENT_MODE=1

    # 生产模式服务
    ros2_servo_prod:
        extends: ros2_servo
        container_name: ros2

        # 生产模式：使用 init.sh（每次启动都构建，确保代码最新）
        command: bash /root/ros_ws/scripts/init.sh

        # 生产模式：总是重启
        restart: always

        # 健康检查（启动时间较长，因为需要构建）
        healthcheck:
            test: ["CMD", "ros2", "node", "list"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 120s  # 增加到120秒，等待构建完成

        profiles:
            - production
